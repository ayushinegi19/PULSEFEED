
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set News Preferences - PulseFeed</title>
    
    <!-- Tailwind CSS & Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">

    <style>
        body {
            background-color: #f4f7f6;
        }
        .ts-wrapper {
            width: 100%;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-globe me-2"></i>PulseFeed
            </a>
            <div class="ms-auto navbar-nav">
                <a class="nav-link me-3" href="{{ url_for('index') }}">
                    <i class="bi bi-house me-1"></i>Home
                </a>
                <a class="nav-link me-3" href="{{ url_for('set_preferences') }}">
                    <i class="bi bi-gear me-1"></i>Preferences
                </a>
                <a class="nav-link me-3" href="{{ url_for('saved') }}"">
                    <i class="bi bi-bookmark me-1"></i>Saved
                </a>
                <a class="nav-link" href="{{ url_for('logout') }}">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Preferences Form -->
    <div class="flex items-center justify-center mt-10">
        <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-lg">
            <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Customize Your News Feed</h2>
            
            <form method="POST" class="space-y-6">
                <!-- News Categories -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2" for="categories">
                        Select News Categories
                    </label>
                    <select id="categories" name="categories" multiple autocomplete="off" class="block w-full" required>
                        <option value="business">Business</option>
                        <option value="technology">Technology</option>
                        <option value="sports">Sports</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="science">Science</option>
                        <option value="health">Health</option>
                        <option value="general">General</option>
                        <option value="politics">Politics</option>
                    </select>
                </div>

                <!-- News Sources -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2" for="sources">
                        Select News Sources
                    </label>
                    <select id="sources" name="sources" multiple autocomplete="off" class="block w-full" required>
                        <option value="bbc-news">BBC News</option>
                        <option value="cnn">CNN</option>
                        <option value="techcrunch">TechCrunch</option>
                        <option value="business-insider">Business Insider</option>
                        <option value="espn">ESPN</option>
                        <option value="national-geographic">National Geographic</option>
                    </select>
                </div>

                <!-- 🌍 Country Selection -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2" for="country">
                        Choose Your Country
                    </label>
                    <select id="country" name="country" class="block w-full">
                        <option value="us">United States</option>
                        <option value="gb">United Kingdom</option>
                        <option value="ca">Canada</option>
                        <option value="in">India</option>
                        <option value="au">Australia</option>
                        <option value="de">Germany</option>
                        <option value="fr">France</option>
                        <option value="jp">Japan</option>
                    </select>
                </div>

                <!-- 🔘 Save Button -->
                <div class="text-center">
                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full transition duration-300 ease-in-out transform hover:scale-105">
                        Save Preferences
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ⚙️ Initialize Tom Select -->
    <script>
        new TomSelect('#categories', {
            maxItems: 5, // Limit to 5 selections
            placeholder: 'Select up to 5 categories'
        });

        new TomSelect('#sources', {
            maxItems: 5, // Limit to 5 selections
            placeholder: 'Select up to 5 sources'
        });
    </script>

</body>
</html>
